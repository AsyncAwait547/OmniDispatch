# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: omnidispatch
metadata:
  template: omnidispatch-agent-service@1.0.0

services:
  agent:
    project: ./agent
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

hooks:
  postprovision:
    shell: pwsh
    run: |
      Write-Host "OmniDispatch deployment complete."
      Write-Host "Agent Service URL: $env:SERVICE_AGENT_URI"
